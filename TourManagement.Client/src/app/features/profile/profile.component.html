<div class="mx-auto max-w-md">
  <h1 class="mb-6 text-xl font-bold text-slate-900">My Profile</h1>

  <div class="mb-6 rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
    <p class="text-sm text-slate-600">
      Signed in as <strong class="text-slate-900">{{ username }}</strong>
    </p>
    <p class="mt-2 text-sm text-slate-600">
      Bonus points: <strong class="text-slate-900">{{ bonusPoints() }}</strong>
    </p>
  </div>

  <form [formGroup]="form" (ngSubmit)="save()" class="space-y-4">
    <fieldset formGroupName="interests">
      <legend class="mb-2 text-sm font-medium text-slate-700">Interests</legend>
      <div class="flex flex-wrap gap-3">
        @for (interest of interests; track interest) {
          <label class="flex items-center gap-1.5 text-sm text-slate-700">
            <input type="checkbox" [formControlName]="interest"
              class="rounded border-slate-300 text-sky-600 focus:ring-sky-500" />
            {{ interest }}
          </label>
        }
      </div>
    </fieldset>

    <label class="flex items-center gap-2 text-sm text-slate-700">
      <input type="checkbox" formControlName="recommendationsEnabled"
        class="rounded border-slate-300 text-sky-600 focus:ring-sky-500" />
      Receive tour recommendations based on my interests
    </label>

    <button type="submit" [disabled]="saving()"
      class="rounded-md bg-sky-600 px-4 py-2 text-sm font-medium text-white hover:bg-sky-700 disabled:opacity-50">
      {{ saving() ? 'Saving...' : 'Save Changes' }}
    </button>
  </form>
</div>
