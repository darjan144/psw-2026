<div class="mx-auto mt-16 w-full max-w-sm">
  <h1 class="mb-6 text-center text-2xl font-bold text-slate-900">Sign In</h1>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <div>
      <label for="username" class="mb-1 block text-sm font-medium text-slate-700">Username</label>
      <input
        id="username"
        formControlName="username"
        type="text"
        class="block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500"
      />
    </div>

    <div>
      <label for="password" class="mb-1 block text-sm font-medium text-slate-700">Password</label>
      <input
        id="password"
        formControlName="password"
        type="password"
        class="block w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-sky-500 focus:outline-none focus:ring-1 focus:ring-sky-500"
      />
    </div>

    <button
      type="submit"
      [disabled]="form.invalid || submitting()"
      class="w-full rounded-md bg-sky-600 px-4 py-2 text-sm font-medium text-white hover:bg-sky-700 disabled:opacity-50"
    >
      {{ submitting() ? 'Signing in...' : 'Sign In' }}
    </button>
  </form>

  <p class="mt-4 text-center text-sm text-slate-600">
    Don't have an account?
    <a routerLink="/register" class="font-medium text-sky-600 hover:text-sky-700">Register</a>
  </p>
</div>
